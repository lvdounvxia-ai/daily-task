# 模型平台
platforms:
  yunwu:
    provider: jz_openai
    api_base_env: YUNWU_API_BASE_URL
    api_key_env: YUNWU_API_KEY
    default_base_url: https://yunwu.ai/v1

  jz_duanju:
    provider: jz_openai
    api_base_env: JZ_API_BASE_URL
    api_key_env: JZ_API_KEY
    default_base_url: https://jzapi.duanju.com/v1

# 评测裁判模型（固定）
judge_models:
  vlm:
    provider: openai_compatible
    api_base_env: JZ_API_BASE_URL
    api_key_env: JZ_API_KEY
    model_env: JZ_JUDGE_VLM_MODEL
    default_model: gemini-2.5-flash
  text:
    provider: openai_compatible
    api_base_env: JZ_API_BASE_URL
    api_key_env: JZ_API_KEY
    model_env: JZ_JUDGE_TEXT_MODEL
    default_model: gemini-2.5-flash

# 被测生成模型
generation_models:
  text_model:
    - id: gemini-3.5-flash
      display_name: gemini-3.5-flash
      platform: jz_duanju
      provider: jz_openai
      api_method: chat_vision
      model: gemini-3.5-flash
      enabled: true

